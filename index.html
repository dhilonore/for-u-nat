<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Untuk Natasya Zalfa Zanzabillah</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #87CEEB;
            --grass-green: #7cfc00;
            --dark-green: #2ecc71;
            --accent-pink: #ff477e;
            --trunk-brown: #8B4513;
            --btn-no: #e74c3c;
            --btn-yes: #2ecc71;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; display: flex; justify-content: center;
            align-items: center; min-height: 100dvh;
            background: linear-gradient(to bottom, #4facfe 0%, #87CEEB 100%);
            font-family: 'Quicksand', sans-serif; overflow: hidden; position: relative;
            touch-action: pan-y;
        }

        /* Latar Belakang */
        .clouds-container { position: absolute; top: 0; left: 0; width: 100%; height: 50%; z-index: 1; pointer-events: none; }
        .cloud { position: absolute; background: white; border-radius: 100px; opacity: 0.8; animation: moveClouds linear infinite; }
        .cloud::after, .cloud::before { content: ''; position: absolute; background: white; border-radius: 50%; }
        .cloud::after { width: 50%; height: 140%; top: -60%; left: 15%; }
        .cloud::before { width: 40%; height: 100%; top: -30%; left: 45%; }
        @keyframes moveClouds { from { left: -250px; } to { left: 110vw; } }

        .forest { position: absolute; bottom: 8vh; width: 100%; height: 150px; z-index: 3; pointer-events: none; }
        .palm-tree { position: absolute; bottom: 0; transform-origin: bottom; animation: swayTree 4s ease-in-out infinite; }
        .trunk { width: 12px; height: 80px; background: var(--trunk-brown); border-radius: 5px; margin: 0 auto; }
        .leaves { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); }
        .leaf { position: absolute; width: 50px; height: 15px; background: #27ae60; border-radius: 50%; transform-origin: left center; }
        .leaf:nth-child(1) { transform: rotate(0deg); }
        .leaf:nth-child(2) { transform: rotate(60deg); }
        .leaf:nth-child(3) { transform: rotate(120deg); }
        .leaf:nth-child(4) { transform: rotate(180deg); }
        .leaf:nth-child(5) { transform: rotate(240deg); }
        .leaf:nth-child(6) { transform: rotate(300deg); }
        @keyframes swayTree { 0%, 100% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } }

        .grass-container { position: absolute; bottom: 0; width: 100%; height: 10vh; display: flex; align-items: flex-end; z-index: 5; }
        .blade { flex: 1; height: 100%; background: linear-gradient(to top, var(--dark-green), var(--grass-green)); border-radius: 50% 50% 0 0; transform-origin: bottom; animation: sway 3s ease-in-out infinite; }
        @keyframes sway { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(4deg); } }

        /* Kartu Pesan */
        .card {
            background: rgba(255, 255, 255, 0.96); padding: 25px; border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1), 6px 6px 0px #333; border: 3.5px solid #333;
            text-align: center; max-width: 410px; width: 88%; position: relative; z-index: 10;
            animation: floatCard 4s ease-in-out infinite;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes floatCard { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .back-arrow {
            position: absolute; top: 15px; left: 15px; font-size: 1.5rem;
            color: #333; cursor: pointer; transition: 0.2s; z-index: 20;
            background: none; border: none; font-family: 'Fredoka One', cursive;
        }

        h1 { font-family: 'Fredoka One', cursive; color: var(--accent-pink); font-size: 1.2rem; margin-bottom: 8px; margin-top: 10px; }
        .text-content {
            font-size: 0.85rem; color: #333; line-height: 1.5; text-align: left;
            max-height: 260px; overflow-y: auto; padding: 10px;
            background: rgba(240, 240, 240, 0.5); border-radius: 15px; font-weight: 600;
        }
        .text-center { text-align: center !important; }

        .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }

        .btn {
            padding: 10px 22px; font-size: 0.95rem;
            font-family: 'Fredoka One', cursive; background-color: var(--accent-pink);
            color: white; border: 3px solid #333; border-radius: 50px;
            cursor: pointer; box-shadow: 4px 4px 0px #333; transition: 0.2s;
            text-decoration: none; display: inline-block;
        }
        .btn-yes { background-color: var(--btn-yes); }
        .btn-no { background-color: var(--btn-no); }
        .btn:active { box-shadow: 0px 0px 0px #333; transform: translate(2px, 2px); }

        .video-container {
            margin-top: 10px; width: 100%; border-radius: 15px; overflow: hidden;
            border: 2px solid #333; background: #000; line-height: 0;
        }
        video { width: 100%; height: auto; }

        .fade-out { opacity: 0; transform: scale(0.5) rotate(-5deg); filter: blur(5px); transition: all 0.4s ease-in; }
        .fade-in { animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3) translateY(100px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .closing-text { font-size: 0.8rem; color: #444; line-height: 1.5; margin: 8px 0; text-align: left; }
        .italic-note { font-size: 0.75rem; font-style: italic; color: #777; margin-top: 2px; text-align: left; margin-bottom: 10px; }
        .emoji { font-size: 2rem; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <audio id="mySong" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div class="clouds-container" id="clouds"></div>
    <div class="forest" id="palm-forest"></div>
    <div class="grass-container" id="grass"></div>

    <div class="card" id="card">
        <div id="content">
            <span class="emoji">🌤️</span>
            <h1>For u Natasya Zalfa Zanzabillah!</h1>
            <p style="font-size: 0.9rem; color: #555;">There’s something I’d like to tell you...</p>
            <button class="btn" onclick="startApp()">Klik untuk Lanjut ✨</button>
        </div>
    </div>

    <script>
        let currentStep = 0;

        function startApp() {
            var audio = document.getElementById("mySong");
            audio.play().catch(e => console.log(e));
            nextMessage();
        }

        function nextMessage() {
            const card = document.getElementById('card');
            const content = document.getElementById('content');
            card.classList.add('fade-out');
            
            setTimeout(() => {
                if (currentStep === 0) {
                    content.innerHTML = `
                        <button class="back-arrow" onclick="prevMessage()">←</button>
                        <span class="emoji">💭</span>
                        <h1>Orientasi</h1>
                        <div class="text-content text-center">Kamu itu kayak kuas yang menyentuh kanvas kosong, pelan-pelan menyebarkan warna di setiap sudut yang tadinya hampa. Hari-hari yang biasa aja tiba-tiba jadi lebih hangat, lebih hidup. Entah kenapa, kalau ngobrol sama kamu, rasanya selalu tenang, kayak warna-warna itu meresap perlahan ke dalam hidupku, pas di tempatnya, membuat semuanya terasa berwarna, nggak lagi sekosong dulu.</div>
                        <button class="btn" style="margin-top:20px" onclick="nextMessage()">Lanjut</button>
                    `;
                    currentStep = 1;
                } else if (currentStep === 1) {
                    content.innerHTML = `
                        <button class="back-arrow" onclick="prevMessage()">←</button>
                        <span class="emoji">💌</span>
                        <h1>For U...</h1>
                        <div class="text-content">Kadang aku bingung mulai dari mana, karena perasaan ini nggak datang dengan suara keras. Dia tumbuh pelan-pelan, tanpa aku sadari, sampai akhirnya aku sadar kalau hampir setiap hal kecil selalu bikin aku kepikiran kamu. Cara kamu ngomong, cara kamu ketawa, bahkan cara kamu diam pun entah kenapa punya tempat sendiri di pikiranku.<br><br>Aku nggak tahu ini akan dibalas seperti apa, dan jujur aja ada takutnya. Takut kalau aku terlalu jauh merasa, takut kalau ternyata kamu nggak ada di frekuensi yang sama. Tapi aku juga capek pura-pura biasa aja, pura-pura gatau aja seolah semua ini cuma hal sepele. Tapi buatku nggak sepele sih, jadi kepikiran mulu dari lama.<br><br>Bener sih kata lagu Ed Sheeran yang judulnya Thinking Out Loud yang bilang “how people fall in love in mysterious ways.” Kayanya aku bener-bener ada di lirik ini. Aku pun bingung kenapa bisa gini, dari awal sebenernya i suka personality kamu, gaya bicara kamu, yappingan kamu, cerita kamu, cara becanda kamu, dan banyak lagi deh pokoknya, ditambah kita satu frekuensi, ditambah hobi kita sama persis sampe gapernah keabisan topik bahkan dulu sering banget sampe ketiduran pas subuh. Aku pun heran kenapa kita punya banyak kesamaan, bahkan di masa lalu kita sama-sama pernah jadi korban “emotional wound” dari seseorang, kamu dengan si dia dan aku dengan si dia, entah takdir atau gimana, atau mungkin ini Red String Theory, maybe? Sering dikaitkan dengan pertemuan "kebetulan" yang sudah diatur takdir<br><br>Soalnya kita kan kenalan dari 2024 ya, pas itu kamu yang inisiatif duluan ngajak kenalan lewat bulan. Aku pas itu iya iya aja, karena nggak enak juga kan sama Bulannya soalnya temennya sendiri gitu kan. Tapi bodohnya aku pas itu kalau kamu chat, aku acuh tak acuh banget balesnya seingetnya sendiri. Maaf ya kalau harus ketemu diriku yang pas itu, aku akuin kok dulu aku bodoh banget asli. setelah dipikir lagi ngegantungin chat orang berhari hari jahat juga ya<br><br>Tapi pas Desember kemaren, aku jujur iseng reply sg mu kamu karena iseng aja, Jujur niat aku pas itu mau minta maaf karna baru kepikirannya pas itu kalo aku pernah jahat ke orang, cuma kayaknya maaf itu nggak terucap sampai sekarang, yaudah ku tuangin di sini aja ya. Eh, entah kenapa kok berawal dari iseng itu kita bisa sampai sedeket ini tuker cerita, ngobrol random, main bareng. Lucu juga kalau diinget, aku juga ga nyangka juga bakal begini<br><br>Eh, pada akhirnya malah aku yang feel harder, emm, apa mungkin ini yang dimaksud she feels first but he feels harder? Ya gatau dah wkwkw. Maaf ya aku gengsi ngungkapin lewat kata-kata entah itu berupa kode/sinyal kalo aku suka, cuma bisa lewat tindakan. Kaya selalu ngeiyain kalau kamu ajak main/nobar dulu padahal ada keperluan juga, aku sempetin. Bahkan dulu-dulu pas aku diajak main/ngobrol sama temen-meten ku, aku lebih prioritasin kamu dibanding yang lain. Aku tau kesukaan kamu apa, makanya kadang aku suka ngide inisiatif beliin. entah kamunya suka apa engga atau malah risih aku gatau, Maaf ya kalo kamunya risih dan maaf kalo cuma bisa begini, karena jujur aku orangnya susah ngungkapin lewat kata-kata entah itu berupa kode/sinyal. Aku mah nggak romantis.<br><br>Aku nggak mengharapkan jawaban yang sempurna. Aku cuma pengen kamu tahu kalau perasaanku tulus. Bukan karena kesepian, bukan karena kagum sesaat, tapi karena aku nyaman, merasa dihargai, dan jadi versi diriku yang lebih baik saat dekat kamu.<br><br>Dan aku tau kok aku nggak sempurna, aku tau banget kok kelebihan dan kekuranganku kaya gimana. Kelebihanku, aku reflektif, mungkin orangnya keliatan kalem, kadang dan slow respon kalo ada urusan atau lagi nggak fokus. Tapi kalau udah peduli sama seseorang, aku bakal serius dan hadir. Aku tipe yang dengerin, berusaha ngerti, dan kalau udah sayang ya tulus. Orangnya loyal asli, kalau udah sama kamu, nggak bakal mikirin yang lain. Aku juga kurang suka konflik daripada ribut aku lebih suka ngalah, Aku orangnya berdasarkan perasaan banget kalo ada hal yang nggak enak buat kamu, aku nggak bakal gengsi buat minta maaf kok.<br><br>Tapi aku juga banyak kurangnya. Suka banget overthinking, kadang terlalu mikirin hal yang engga engga padahal itu belum tentu terjadi, mungkin iya aku di mata kamu kaya orang cuek dan jarang inisiatif duluan tpi jujur kadang kalo mau ngajak kamu main tuh takut ganggu kamunya makanya kadang suka ku urungin niat tersebut, dan kesannya kaya kamu mulu yang inisiatif, maaf ya tapi ini beneran aku banget suka ga enakan sama orang dan aku ngga selalu jago nunjukin perasaan secara langsung. Aku juga denial, suka nggak mau ngaku kalau dari awal aku suka ke kamu, sebenernya lebih ke arah tsundere sih aku kalo kata orang, entah ya mungkin iya, kaya malu tapi mau. Aku nggak jago gombal, nggak jago ngerayu, nggak jago bikin kata-kata manis. Aku nggak mau pura-pura jadi orang lain, ini aku apa adanya. aku mau bilang <b>Ich mag dich sehr. Will you be my Waguri, and I’ll be your Rintaro?</b></div>
                        <div class="btn-group">
                            <button class="btn btn-yes" onclick="finalPage('yes')">Yes</button>
                            <button class="btn btn-no" onclick="finalPage('no')">No</button>
                        </div>
                    `;
                    currentStep = 2;
                }
                card.classList.remove('fade-out');
                card.classList.add('fade-in');
                setTimeout(() => card.classList.remove('fade-in'), 600);
            }, 400);
        }

        function prevMessage() {
            const card = document.getElementById('card');
            card.classList.add('fade-out');
            setTimeout(() => {
                if (currentStep === 1) location.reload();
                else if (currentStep === 2) { currentStep = 0; nextMessage(); }
            }, 400);
        }

        function finalPage(choice) {
            const card = document.getElementById('card');
            const content = document.getElementById('content');
            card.classList.add('fade-out');
            
            setTimeout(() => {
                if (choice === 'yes') {
                    content.innerHTML = `
                        <button class="back-arrow" onclick="backToForU()">←</button>
                        <span class="emoji">💖</span>
                        <h1 style="font-size:1rem"> Vielen Dank‎ ‎ ‎ | ‎ ‎ ‎ 月が綺麗ですね? </h1>
                        <div class="closing-text">
                            Sebenarnya aku sudah cukup tahu apa jawabanmu. Kalau ternyata memang bukan seperti yang aku harapkan, aku harap kita tetap bisa berinteraksi seperti biasa. Anggap saja ini cuma aku yang jujur tentang perasaanku, tanpa harus mengubah apa pun di antara kita. Aku tetap menghargai kamu seperti sebelumnya. Kalau suatu saat kamu butuh bantuan atau apa pun, bilang saja ya aku akan dengan senang hati membantu. Tapi keputusan akhirnya tetap ada di kamu kok.
                        </div>
                        <p class="italic-note">- anything you want</p>
                        <button class="btn" onclick="playSongPage()">nih ada lagu buat kamu :) ✨</button>
                    `;
                } else {
                    document.getElementById("mySong").pause();
                    content.innerHTML = `
                        <button class="back-arrow" onclick="backToForU()">←</button>
                        <span class="emoji">🍃</span>
                        <h1>I Understand...</h1>
                        <div class="closing-text">
                            Terima kasih sudah jujur, Natasya. Aku sangat menghargai keputusanmu. Seperti yang aku bilang, perasaan ini tulus dan aku tidak ingin memaksakan apa pun. Semoga kita tetap bisa berteman baik seperti biasanya ya. Aku tetap di sini kalau kamu butuh teman ngobrol atau bantuan.<br><br>
                            Semoga kamu selalu bahagia!
                        </div>
                        <p class="italic-note">- anything you want</p>
                        <button class="btn" onclick="location.reload()">Selesai</button>
                    `;
                }
                card.classList.remove('fade-out');
                card.classList.add('fade-in');
                setTimeout(() => card.classList.remove('fade-in'), 600);
            }, 400);
        }

        function playSongPage() {
            const card = document.getElementById('card');
            const content = document.getElementById('content');
            card.classList.add('fade-out');

            setTimeout(() => {
                document.getElementById("mySong").pause();
                content.innerHTML = `
                    <button class="back-arrow" onclick="finalPage('yes')">←</button>
                    <span class="emoji">🎵</span>
                    <h1>Song for You</h1>
                    <div class="video-container">
                        <video id="finalVideo" controls autoplay playsinline><source src="video.mp4" type="video/mp4"></video>
                    </div>
                    <p style="font-size: 0.8rem; margin-top: 15px; color: #555; font-weight: 600;">Special for Natasya Zalfa Zanzabillah</p>
                    <button class="btn" style="background-color: #95a5a6; font-size: 0.8rem;" onclick="location.reload()">Back to Start</button>
                `;
                card.classList.remove('fade-out');
                card.classList.add('fade-in');
                setTimeout(() => card.classList.remove('fade-in'), 600);
            }, 400);
        }

        function backToForU() {
            const card = document.getElementById('card');
            card.classList.add('fade-out');
            setTimeout(() => {
                document.getElementById("mySong").play();
                currentStep = 1;
                nextMessage();
            }, 400);
        }

        // Animasi Latar
        const cloudCont = document.getElementById('clouds');
        for (let i = 0; i < 6; i++) {
            const cloud = document.createElement('div');
            cloud.className = 'cloud';
            cloud.style.width = (Math.random() * 80 + 60) + 'px';
            cloud.style.height = '30px';
            cloud.style.top = (Math.random() * 40) + '%';
            cloud.style.left = (Math.random() * 100) + 'vw';
            cloud.style.animationDuration = (Math.random() * 15 + 15) + 's';
            cloudCont.appendChild(cloud);
        }

        const forest = document.getElementById('palm-forest');
        const treePositions = [10, 25, 75, 90]; 
        for (let i = 0; i < treePositions.length; i++) {
            const tree = document.createElement('div');
            tree.className = 'palm-tree';
            tree.style.left = treePositions[i] + '%';
            const scale = 0.45 + Math.random() * 0.3;
            tree.style.transform = `scale(${scale})`;
            tree.innerHTML = `<div class="leaves"><div class="leaf"></div><div class="leaf"></div><div class="leaf"></div><div class="leaf"></div><div class="leaf"></div><div class="leaf"></div></div><div class="trunk"></div>`;
            forest.appendChild(tree);
        }

        const grassContainer = document.getElementById('grass');
        for (let i = 0; i < 30; i++) {
            const blade = document.createElement('div');
            blade.className = 'blade';
            blade.style.animationDelay = (Math.random() * 2) + 's';
            grassContainer.appendChild(blade);
        }
    </script>
</body>
</html>
